# shadow_market/frontend/nginx.conf
# Revision History:
# 2025-04-07: Initial basic Nginx configuration for serving SPA.
#             - Runs as non-root 'nginx' user.
#             - Listens on port 8080.
#             - Serves static files from /usr/share/nginx/html.
#             - Includes try_files directive for SPA routing.
#             - Basic security headers added (X-Frame-Options, X-Content-Type-Options, Referrer-Policy).
#             - Basic Gzip configuration.
#             - Denies access to hidden files.
#             - Includes example caching headers for immutable assets.

user nginx;            # Use the non-root user defined in the base image
worker_processes auto; # Use optimal number of worker processes
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn; # Log warnings and errors

events {
    worker_connections 1024; # Default max connections per worker
}

http {
    include /etc/nginx/mime.types;        # Include standard MIME types
    default_type application/octet-stream; # Default type if MIME type is unknown

    # --- Security Headers ---
    # Prevents clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Prevents browsers from MIME-sniffing the content-type
    add_header X-Content-Type-Options "nosniff" always;
    # Controls how much referrer information is sent with requests
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Example Content Security Policy (CSP) - Uncomment and TUNE CAREFULLY for your specific app needs
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' http://localhost:8000;" always;

    # --- Performance ---
    # Enable Gzip compression for text-based assets
    gzip on;
    gzip_vary on; # Adds 'Vary: Accept-Encoding' header
    gzip_proxied any; # Compress for all proxied requests
    gzip_comp_level 6; # Compression level (1-9)
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Optional: Define log format if different from default needed
    # access_log /var/log/nginx/access.log combined;

    # --- Server Block ---
    server {
        listen 8080 default_server; # Listen on port 8080 (matches EXPOSE in Dockerfile)
        server_name _;              # Respond to any hostname

        # Root directory where static files were copied in Dockerfile
        root /usr/share/nginx/html;
        # Default file to serve if requesting a directory
        index index.html index.htm;

        location / {
            # Essential for Single Page Applications (SPAs) like React/Vue/Angular:
            # Try to serve the requested file directly ($uri).
            # If it's a directory, try serving index file ($uri/).
            # If neither exists, fallback to serving /index.html (letting client-side router handle the path).
            try_files $uri $uri/ /index.html;
        }

        # Optional: Add specific caching headers for static assets
        # Cache immutable assets (JS, CSS, images with hashes in filenames) for a long time
        # Assumes your build process generates filenames with content hashes (e.g., main.a1b2c3d4.js)
        location ~* \.(?:css|js)$ {
             if ($request_filename ~* \.[a-f0-9]{8,}\.(css|js)$) { # Check for hash (8+ hex chars) in filename
                expires 1y;
                add_header Cache-Control "public, immutable";
             }
        }
        location ~* \.(?:jpg|jpeg|gif|png|ico|svg|woff|woff2|ttf|eot)$ {
            # Cache these font/image assets long-term too
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Deny access to hidden files (e.g., .git, .htaccess)
        location ~ /\. {
            deny all;
            return 404; # Or 403 Forbidden
        }
    }
}