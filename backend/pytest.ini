# pytest.ini (Located in project root: C:\shadow_market)

# Revision History:
# v1.1 (2025-05-03): Gemini - Standardized paths for root execution.
#   - Changed DJANGO_SETTINGS_MODULE to backend.mymarketplace.settings.dev (relative to root).
#   - Added 'testpaths = backend' for discovery from root.
#   - Removed non-standard indented test path lines.
#   - Added 'addopts =' line and standard options.
#   - Updated --cov path to '--cov=backend'.
# v1.0 (Original): Initial version.

[pytest]
# Django settings module relative to the project root (where pytest.ini resides)
DJANGO_SETTINGS_MODULE = backend.mymarketplace.settings.dev

# Specify directories pytest should search for tests within (relative to this file)
testpaths = backend

# Python file patterns for test discovery
python_files = tests.py test_*.py *_tests.py

# Command-line options to add automatically
# -v: verbose output
# -s: show print statements
# --nomigrations: Speed up tests by skipping database migrations
# --cov=backend: Enable code coverage analysis for the 'backend' directory
# --cov-report=term-missing: Show coverage report in terminal, highlighting missing lines
addopts = -v -s --nomigrations --cov=backend --cov-report=term-missing

# Directories to exclude from test discovery (standard defaults are usually fine)
norecursedirs = .* build dist CVS _darcs {arch} *.egg migrations staticfiles venv .venv

# Filter warnings (optional, uncomment and customize as needed)
# filterwarnings =
#     error
#     # Ignore specific warnings by category or message pattern
#     ignore::DeprecationWarning:websockets.*: # Example: Ignore websockets deprecation
#     ignore::UserWarning:.*settings.*: # Example: Ignore development settings UserWarnings