# shadow_market/kubernetes/postgres-service.yaml
# /***************************************************************************************
# * REVISION HISTORY (Most recent first)
# ***************************************************************************************
# * 2025-04-28    [Gemini]   Reviewed configuration. Added comment clarifying
# * targetPort dependency on named port in StatefulSet. No functional changes.
# * 2025-04-07    [Original] Initial creation. Defines the Headless Service for the PostgreSQL StatefulSet.
# ***************************************************************************************/

apiVersion: v1
kind: Service
metadata:
  # Service name MUST match 'POSTGRES_HOST' in configmap.yaml and 'serviceName' in postgres-statefulset.yaml
  name: shadow-market-postgres-svc
  namespace: shadow-market        # Deployed into the application's namespace
  labels:
    app: postgres               # Labels to associate with the StatefulSet
    tier: database
spec:
  ports:
    - port: 5432                # Port the Service will expose
      # targetPort references the 'name' of the containerPort in the StatefulSet pod template.
      # Ensure the StatefulSet defines a containerPort named 'postgresql' targeting port 5432.
      targetPort: postgresql
      protocol: TCP
      name: tcp-postgresql      # Optional name for the port mapping
  selector:
    # Selects the Pods managed by the StatefulSet based on their labels
    app: postgres
    tier: database
  # Setting clusterIP to None makes this a "headless" service.
  # This is required for StatefulSets to provide stable DNS entries for each Pod.
  clusterIP: None
  # Optional: Set publishNotReadyAddresses to true if clients need to discover pods
  # even before they become fully Ready (usually not needed for standard DB connections).
  # publishNotReadyAddresses: true