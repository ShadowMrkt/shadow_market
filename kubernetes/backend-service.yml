# shadow_market/kubernetes/backend-service.yaml
# /***************************************************************************************
# * REVISION HISTORY (Most recent first)
# ***************************************************************************************
# * 2025-04-28    [Gemini]   Reviewed configuration. Added comment confirming
# * targetPort 'http' matches named port in Deployment. No functional changes.
# * 2025-04-07    [Original] Initial creation. Defines the ClusterIP Service for the Backend Deployment.
# ***************************************************************************************/

apiVersion: v1
kind: Service
metadata:
  name: shadow-market-backend-svc # Stable name for accessing the backend service
  namespace: shadow-market       # Deployed into the application's namespace
  labels:
    app: shadow-market         # Labels to associate with the Backend Deployment
    tier: backend
spec:
  ports:
    - port: 80                 # Port the Service exposes internally (common choice for HTTP)
      # targetPort references the 'name' of the containerPort in the Backend Deployment pod spec.
      # Verified that Backend Deployment defines a containerPort named 'http' targeting port 8000.
      targetPort: http
      protocol: TCP
      name: http               # Name for the port mapping, referenced by Ingress and Frontend Egress Policy
  selector:
    # Selects the Pods managed by the Backend Deployment based on their labels
    app: shadow-market
    tier: backend
  # type: ClusterIP is the default and makes the service reachable only within the cluster.
  type: ClusterIP