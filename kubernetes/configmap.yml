# ***************************************************************************************/

apiVersion: v1
kind: ConfigMap
metadata:
  name: shadow-market-config # Name used to reference this ConfigMap
  namespace: shadow-market  # Deployed into the application's namespace
data:
  # --- General Application Settings ---
  DJANGO_ENV: "production"
  DJANGO_SETTINGS_MODULE: "mymarketplace.settings.prod" # Path to production settings

  # --- Database Connection (Internal Kubernetes Service Names) ---
  POSTGRES_DB: "shadowmarket_prod"
  POSTGRES_USER: "shadowmarket_user"
  # Service name MUST match the name defined in postgres-service.yaml
  POSTGRES_HOST: "shadow-market-postgres-svc"
  POSTGRES_PORT: "5432"

  # --- Redis Connection (Internal Kubernetes Service Name) ---
  # Service name MUST match the name defined in redis-service.yaml
  REDIS_HOST: "shadow-market-redis-svc"
  REDIS_PORT: "6379"
  REDIS_DB_CACHE: "1" # Database index for Django cache (as per prod settings)
  # Construct Redis URL for django-redis (cache - uses DB 1)
  # NOTE: Password should come from Vault/Secret if required.
  REDIS_URL: "redis://shadow-market-redis-svc:6379/1"

  # --- Celery Configuration ---
  # Broker URL (using Redis DB 0)
  # NOTE: If Redis requires a password, it MUST be included here, ideally fetched
  # from the same Secret/Vault source as the backend uses.
  # Example with password placeholder: redis://:{{ REDIS_PASSWORD_PLACEHOLDER }}@shadow-market-redis-svc:6379/0
  CELERY_BROKER_URL: "redis://shadow-market-redis-svc:6379/0"
  # CELERY_RESULT_BACKEND is set to 'django-db' in settings/base.py, so not needed here.

  # --- Backend WSGI Server (Gunicorn) ---
  GUNICORN_WORKERS: "4" # Adjust based on pod CPU limits/requests
  GUNICORN_BIND_ADDR: "0.0.0.0:8000" # Address Gunicorn binds to inside container

  # --- Frontend Web Server (Nginx) ---
  # NGINX_LISTEN_PORT: "8080" # Defined here if needed by other components

  # --- Allowed Hosts ---
  # CRITICAL: Replace this placeholder during deployment!
  # MUST include .onion address and any clearnet domains. Comma-separated.
  # Example: ".your-xyz-onion-address.onion,www.your-clearnet-domain.com"
  DJANGO_ALLOWED_HOSTS: "{{ DJANGO_ALLOWED_HOSTS_PLACEHOLDER }}" # <<< MUST BE REPLACED!

  # --- Django Axes (Login Security) ---
  AXES_FAILURE_LIMIT: "5"
  AXES_COOLOFF_MINUTES: "15"

  # --- External Service Addresses (Uncomment and configure if needed by app directly) ---
  # VAULT_ADDR: "http://vault.vault.svc.cluster.local:8200" # If app needs direct Vault addr
  # MONERO_RPC_URL: "{{ MONERO_RPC_URL_PLACEHOLDER }}"     # e.g., http://monero-node.crypto.svc:18081/json_rpc
  # BITCOIN_RPC_URL: "{{ BITCOIN_RPC_URL_PLACEHOLDER }}"   # e.g., http://bitcoin-node.crypto.svc:8332
  # ETHEREUM_NODE_URL: "{{ ETHEREUM_NODE_URL_PLACEHOLDER }}" # e.g., ws://ethereum-node.crypto.svc:8546

  # --- Other Non-Sensitive Settings ---
  # SENTRY_DSN: Managed via Vault/Secrets due to its sensitivity. Not set here.