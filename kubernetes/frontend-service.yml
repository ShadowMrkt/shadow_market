# * 2025-04-28    [Gemini]   Reviewed configuration. Added comment clarifying
# * targetPort dependency on named port in Deployment. No functional changes.
# * 2025-04-07    [Original] Initial creation. Defines the ClusterIP Service for the Frontend Deployment.
# ***************************************************************************************/

apiVersion: v1
kind: Service
metadata:
  name: shadow-market-frontend-svc # Stable name for accessing the frontend service
  namespace: shadow-market        # Deployed into the application's namespace
  labels:
    app: shadow-market          # Labels to associate with the Frontend Deployment
    tier: frontend
spec:
  ports:
    - port: 80                  # Port the Service exposes internally (standard HTTP port)
      # targetPort references the 'name' of the containerPort in the Frontend Deployment pod spec.
      # Ensure the Deployment defines a containerPort named 'http' targeting the actual container port (e.g., 8080).
      targetPort: http
      protocol: TCP
      name: http                # Name for the port mapping, referenced by Ingress
  selector:
    # Selects the Pods managed by the Frontend Deployment based on their labels
    app: shadow-market
    tier: frontend
  # type: ClusterIP is the default and makes the service reachable only within the cluster.
  # An Ingress resource targets this Service to expose it externally.
  type: ClusterIP