# shadow_market/kubernetes/frontend-service.yaml
# Revision History:
# 2025-04-07: Initial creation. Defines the ClusterIP Service for the Frontend Deployment.

apiVersion: v1
kind: Service
metadata:
  name: shadow-market-frontend-svc # Stable name for accessing the frontend service
  namespace: shadow-market        # Deployed into the application's namespace
  labels:
    app: shadow-market          # Labels to associate with the Frontend Deployment
    tier: frontend
spec:
  ports:
    - port: 80                  # Port the Service will expose internally (standard HTTP port)
      targetPort: http          # Name of the port defined in the Frontend Deployment Pod template ('http' -> 8080)
      protocol: TCP
      name: http                # Optional name for the port mapping
  selector:
    # Selects the Pods managed by the Frontend Deployment based on their labels
    app: shadow-market
    tier: frontend
  # type: ClusterIP is the default and makes the service reachable only within the cluster.
  # An Ingress resource will typically target this Service to expose it externally.
  type: ClusterIP