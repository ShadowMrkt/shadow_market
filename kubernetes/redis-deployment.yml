# shadow_market/kubernetes/redis-deployment.yaml
# /***************************************************************************************
# * REVISION HISTORY (Most recent first)
# ***************************************************************************************
# * 2025-04-28    [Gemini]   Enabled password authentication (--requirepass).
# * Updated readiness/liveness probes to use password.
# * Added basic securityContext (runAsUser 999, non-root).
# * Added comments regarding persistence.
# * 2025-04-07    [Original] Initial creation. Defines the Redis Deployment.
# ***************************************************************************************/

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shadow-market-redis # Name of the Deployment
  namespace: shadow-market   # Deployed into the application's namespace
  labels:
    app: redis             # Labels for selecting/grouping
    tier: cache
spec:
  replicas: 1 # Start with 1 replica; HA Redis requires Sentinel/Cluster setup
  selector:
    matchLabels: # Selector to find Pods managed by this Deployment
      app: redis
      tier: cache
  template: # Pod template used to create new Pods
    metadata:
      labels: # Labels applied to each Pod
        app: redis
        tier: cache
    spec:
      # --- Optional Pod Security Context ---
      # Ensures container runs as non-root 'redis' user and group
      securityContext:
        runAsUser: 999 # UID for 'redis' user in official image
        runAsGroup: 999 # GID for 'redis' group
        fsGroup: 999 # Ensures volume group ownership if persistence is added
        runAsNonRoot: true
      containers:
        - name: redis
          image: redis:7-alpine # Use a specific, stable image version
          imagePullPolicy: IfNotPresent # Pull if image not present locally
          # --- Optional Container Security Context (Alternative to Pod Level) ---
          # securityContext:
          #   runAsUser: 999
          #   runAsNonRoot: true
          #   allowPrivilegeEscalation: false
          #   capabilities:
          #     drop: ["ALL"]
          ports:
            - name: redis-port # Port name referenced by Service targetPort
              containerPort: 6379 # Standard Redis port
              protocol: TCP
          # Explicitly start redis-server and require password authentication
          command: ["redis-server"]
          args: ["--requirepass", "$(REDIS_PASSWORD)"] # Requires REDIS_PASSWORD env var
          env:
             # Source optional password from Secret
             - name: REDIS_PASSWORD
               valueFrom:
                 secretKeyRef:
                   name: shadow-market-secrets # Reference the Secret created earlier
                   key: REDIS_PASSWORD
                   # If optional is true and secret is missing, requirepass will fail.
                   # Ensure the Secret/Key exists if auth is desired.
                   optional: false # Set to false if password is REQUIRED
          resources: # Resource requests/limits (adjust for cache size/load)
            requests: # Minimum resources required
              memory: "128Mi"
              cpu: "100m" # 0.1 CPU core
            limits: # Maximum resources allowed
              memory: "512Mi"
              cpu: "500m" # 0.5 CPU core
          readinessProbe: # Check if Redis is ready to accept commands (with password)
            exec:
              # Use AUTH command with password from env var before PING
              command: ["sh", "-c", "redis-cli -a \"$(REDIS_PASSWORD)\" ping | grep PONG"]
            initialDelaySeconds: 10 # Wait before first probe
            periodSeconds: 10       # How often to probe
            timeoutSeconds: 5       # When to time out
            failureThreshold: 3     # How many failures before marking Unready
          livenessProbe: # Check if the Redis process is still running (with password)
            exec:
              # Use AUTH command with password from env var before PING
              command: ["sh", "-c", "redis-cli -a \"$(REDIS_PASSWORD)\" ping | grep PONG"]
            initialDelaySeconds: 20 # Wait longer before first liveness probe
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          # --- Persistence Configuration ---
          # No volumes defined. Redis data is ephemeral (lost on pod restart).
          # This is acceptable for cache but review implications for Celery broker durability.
          # If persistence is required, define a 'volumeMounts' section here and
          # add a 'PersistentVolumeClaim' outside this Deployment or use a StatefulSet.
          # Example mount:
          # volumeMounts:
          # - name: redis-data
          #   mountPath: /data