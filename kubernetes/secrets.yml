# !!! WARNING !!! WARNING !!! WARNING !!! WARNING !!! WARNING !!!
#
# DO NOT COMMIT REAL SECRETS TO VERSION CONTROL (GIT).
# This file is a PLACEHOLDER only. The 'data' values below are DUMMY placeholders.
# Manage real secrets using Vault, a cloud provider's secret manager,
# or apply a local, non-committed file manually via kubectl.
#
# To encode a real secret locally: echo -n 'your-real-secret-value' | base64
#
# !!! WARNING !!! WARNING !!! WARNING !!! WARNING !!! WARNING !!!

apiVersion: v1
kind: Secret
metadata:
  name: shadow-market-secrets # Name used to reference this Secret object
  namespace: shadow-market     # Deployed into the application's namespace
type: Opaque # Default type for arbitrary key-value secrets
data:
  # Key: Value (Value MUST be base64 encoded)

  # --- Secrets needed for Infrastructure Components ---

  # PostgreSQL Database Password (Used by postgres-statefulset.yml for initialization)
  # Example dummy value: echo -n 'verySecureDbPassword123!' | base64
  POSTGRES_PASSWORD: dmVyeVNlY3VyZURiUGFzc3dvcmQxMjMh # <<< REPLACE WITH REAL ENCODED SECRET DURING DEPLOYMENT

  # Redis Password (Used by redis-deployment.yml if Redis authentication is enabled)
  # Leave value empty if no password, or omit the key if optional: true is used in Deployments.
  # Example dummy value: echo -n 'secureRedisPassword456!' | base64
  REDIS_PASSWORD: c2VjdXJlUmVkaXNQYXNzd29yZDQ1NiE= # <<< REPLACE WITH REAL ENCODED SECRET (OR REMOVE IF NO AUTH)

  # --- Secrets sourced from Vault by Application Pods ---
  # DJANGO_SECRET_KEY: (Removed - Now sourced from Vault by backend/worker/beat pods)

  # --- Optional: Secrets for Vault AppRole (if using Vault AppRole auth - K8s SA auth preferred) ---
  # VAULT_ROLE_ID: BASE64_ENCODED_VAULT_ROLE_ID_HERE
  # VAULT_SECRET_ID: BASE64_ENCODED_VAULT_SECRET_ID_HERE

  # --- Optional: Other sensitive data (Consider managing via Vault) ---
  # SENTRY_DSN: BASE64_ENCODED_SENTRY_DSN_HERE # Recommended: Manage via Vault
  # THIRD_PARTY_API_KEY: BASE64_ENCODED_API_KEY_HERE