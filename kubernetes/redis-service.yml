# * 2025-04-28    [Gemini]   Reviewed configuration. Added comment clarifying
# * targetPort dependency on named port in Deployment. No functional changes.
# * 2025-04-07    [Original] Initial creation. Defines the ClusterIP Service for the Redis Deployment.
# ***************************************************************************************/

apiVersion: v1
kind: Service
metadata:
  # Service name MUST match 'REDIS_HOST' used in configmap.yaml
  name: shadow-market-redis-svc
  namespace: shadow-market     # Deployed into the application's namespace
  labels:
    app: redis               # Labels to associate with the Redis Deployment
    tier: cache
spec:
  ports:
    - port: 6379             # Port the Service will expose internally
      # targetPort references the 'name' of the containerPort in the Redis Deployment pod spec.
      # Ensure the Deployment defines a containerPort named 'redis-port' targeting port 6379.
      targetPort: redis-port
      protocol: TCP
      name: tcp-redis        # Optional name for the port mapping
  selector:
    # Selects the Pods managed by the Redis Deployment based on their labels
    app: redis
    tier: cache
  # type: ClusterIP is the default and suitable for an internal cache service.
  type: ClusterIP